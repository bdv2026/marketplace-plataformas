<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.D.V. Shopping Virtual</title>

  <style>
    body {
      margin: 0;
      background: #050608;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 CENA FIXA (MUNDO DO JOGO) */
    .world {
      width: 1160px;
      height: 720px; /* base fixa da cena */
      position: relative;
      transform-origin: center center;
    }

    /* 🔥 FUNDO GARANTIDO SEM SUMIR */
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: -2;
      pointer-events: none;
    }

    /* CAMADA GERAL */
    .container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      z-index: 2;
    }

    /* LOGOS */
    .logos {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 220px;
      height: 100%;
      background: url('tijolo-fundo.png') no-repeat center;
      background-size: cover;
      padding: 20px;
    }

    .logos a {
      display: block;
      text-align: center;
    }

    .logos img {
      height: 90px;
      transition: 0.2s;
    }

    .logos img[alt="Mercado Livre"] { height: 160px; }
    .logos img[alt="Jequiti"],
    .logos img[alt="Shopee"],
    .logos img[alt="SHEIN"] { height: 110px; }

    .logos a:hover img {
      transform: scale(1.05);
    }

    /* PRODUTOS LATERAIS (FIXOS NA CENA) */
    .produtos-esquerda,
    .produtos-direita {
      position: absolute;
      top: 0;
      height: 100%;
      width: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      pointer-events: none;
    }

    .produtos-esquerda { left: -180px; }
    .produtos-direita { right: -180px; }

    .produtos-esquerda img,
    .produtos-direita img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      opacity: 0.95;
    }

  </style>
</head>

<body>

<div class="world" id="world">

  <!-- FUNDO (FACHADA GARANTIDA) -->
  <img class="bg" src="fachada.png">

  <!-- PRODUTOS ESQUERDA -->
  <div class="produtos-esquerda">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
  </div>

  <!-- PRODUTOS DIREITA -->
  <div class="produtos-direita">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

  <div class="container">

    <div class="logos">
      <a href="https://meli.la/2qu3xa4" target="_blank">
        <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      </a>

      <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
        <img src="logomarca-magalu.png" alt="Magalu">
      </a>

      <a href="SEU-LINK-AMAZON" target="_blank">
        <img src="logomarca-amazon.jpg" alt="Amazon">
      </a>
    </div>

    <div class="logos">
      <a href="SEU-LINK-JEQUITI" target="_blank">
        <img src="logomarca-jequiti.png" alt="Jequiti">
      </a>

      <a href="SEU-LINK-SHOPEE" target="_blank">
        <img src="logomarca-Shopee.jpg" alt="Shopee">
      </a>

      <a href="SEU-LINK-SHEIN" target="_blank">
        <img src="logomarca-shein.png" alt="SHEIN">
      </a>
    </div>

  </div>

</div>

<script>
  function fitWorld() {
    const world = document.getElementById("world");

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const baseW = 1160;
    const baseH = 720;

    // 🔥 ESCALA REAL "CONTAIN" (NÃO DISTORCE VISÃO)
    const scale = Math.min(vw / baseW, vh / baseH);

    world.style.transform = `scale(${scale})`;
  }

  window.addEventListener("resize", fitWorld);
  window.addEventListener("load", fitWorld);
</script>

</body>
</html>
