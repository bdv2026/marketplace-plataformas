<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.D.V. Shopping Virtual</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050608;
      position: relative;
      overflow: hidden; /* 🔥 trava rolagem */
      height: 100vh;
    }

    /* FACHADA */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      background: url('fachada.png') no-repeat center top;
      background-size: contain;
      z-index: -1;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
    }

    /* DESKTOP (INALTERADO) */
    .logos {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 220px;
      height: 100%;
      background: url('tijolo-fundo.png') no-repeat center;
      background-size: cover;
      padding: 20px;
      box-sizing: border-box;
    }

    .logos a {
      text-align: center;
    }

    .logos img {
      height: 90px;
    }

    .logos img[alt="Mercado Livre"] {
      height: 160px;
    }

    .logos img[alt="Jequiti"],
    .logos img[alt="Shopee"],
    .logos img[alt="SHEIN"] {
      height: 110px;
    }

    /* PRODUTOS */
    .produtos-esquerda,
    .produtos-direita {
      position: fixed;
      top: 0;
      height: 100%;
      width: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      pointer-events: none;
    }

    .produtos-esquerda {
      left: calc(50% - 400px);
    }

    .produtos-direita {
      right: calc(50% - 400px);
    }

    .produtos-esquerda img,
    .produtos-direita img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
    }

    /* 🔥 MOBILE AJUSTADO CORRETAMENTE */
    @media (max-width: 768px) {

      body {
        overflow: hidden;
        height: 100vh;
      }

      /* 🔥 LARGURA REAL DO TIJOLO (NÃO MINÚSCULA) */
      .logos {
        flex: none;
        width: 90px; /* 👉 largura real visível e equilibrada */
        min-width: 90px;
        max-width: 90px;

        height: 100%;
        padding: 10px 5px;

        background-size: contain;
        background-repeat: repeat-y;
      }

      /* 🔥 TODOS OS LOGOS PADRONIZADOS (PELO MAIOR) */
      .logos img {
        height: 65px;
      }

      .logos img[alt="Mercado Livre"] {
        height: 75px;
      }

      /* 🔥 PRODUTOS GRANDES (MESMO NÍVEL DOS LOGOS) */
      .produtos-esquerda,
      .produtos-direita {
        width: 80px;
      }

      .produtos-esquerda {
        left: calc(50% - 180px);
      }

      .produtos-direita {
        right: calc(50% - 180px);
      }

      .produtos-esquerda img,
      .produtos-direita img {
        max-height: 65px;
      }

    }

  </style>
</head>

<body>

  <!-- PRODUTOS -->
  <div class="produtos-esquerda">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
  </div>

  <div class="produtos-direita">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="logos">
      <a href="https://meli.la/2qu3xa4" target="_blank">
        <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      </a>

      <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
        <img src="logomarca-magalu.png" alt="Magalu">
      </a>

      <a href="SEU-LINK-AMAZON" target="_blank">
        <img src="logomarca-amazon.jpg" alt="Amazon">
      </a>
    </div>

    <!-- DIREITA -->
    <div class="logos">
      <a href="SEU-LINK-JEQUITI" target="_blank">
        <img src="logomarca-jequiti.png" alt="Jequiti">
      </a>

      <a href="SEU-LINK-SHOPEE" target="_blank">
        <img src="logomarca-Shopee.jpg" alt="Shopee">
      </a>

      <a href="SEU-LINK-SHEIN" target="_blank">
        <img src="logomarca-shein.png" alt="SHEIN">
      </a>
    </div>

  </div>

</body>
</html>
