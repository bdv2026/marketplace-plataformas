<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #050608;
  overflow: hidden;
  height: 100%;
}

/* 🔥 FUNDO FIXO (SEM MUDANÇA) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  pointer-events: none;
  z-index: -1;
}

/* 🔥 FIX REAL DA CÂMERA (CORREÇÃO PRINCIPAL) */
#viewport {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* 🔥 CENA NÃO USA MAIS LEFT 50% */
#scene {
  width: 1160px;
  height: 100vh;
  transform-origin: top center;
}

/* --- SEU LAYOUT ORIGINAL ABAIXO --- */

.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
}

.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 0 0 220px;
  height: 100%;
  background: url('tijolo-fundo.png') no-repeat center;
  background-size: cover;
  padding: 20px;
}

.logos a {
  display: block;
  text-align: center;
}

.logos img {
  height: 90px;
}

.logos img[alt="Mercado Livre"] { height: 160px; }
.logos img[alt="Jequiti"],
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { height: 110px; }

.logos:last-child {
  justify-content: flex-start;
  padding-top: 30px;
  gap: 35px;
}

.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 180px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  pointer-events: none;
}

.produtos-esquerda { left: calc(50% - 400px); }
.produtos-direita { right: calc(50% - 400px); }

.produtos-esquerda img,
.produtos-direita img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}
</style>
</head>

<body>

<div id="viewport">
  <div id="scene">

    <div class="produtos-esquerda">
      <img src="decora.webp">
      <img src="eletrodomestico.jpg">
      <img src="eletroeletronico.jpg">
      <img src="jardinagem.jpg">
    </div>

    <div class="produtos-direita">
      <img src="ferramentas.webp">
      <img src="suplemento.jpg">
      <img src="roupa-acessorio.jpg">
    </div>

    <div class="container">

      <div class="logos">
        <a href="https://meli.la/2qu3xa4" target="_blank">
          <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
        </a>
        <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
          <img src="logomarca-magalu.png" alt="Magalu">
        </a>
        <a href="SEU-LINK-AMAZON" target="_blank">
          <img src="logomarca-amazon.jpg" alt="Amazon">
        </a>
      </div>

      <div class="logos">
        <a href="SEU-LINK-JEQUITI" target="_blank">
          <img src="logomarca-jequiti.png" alt="Jequiti">
        </a>
        <a href="SEU-LINK-SHOPEE" target="_blank">
          <img src="logomarca-Shopee.jpg" alt="Shopee">
        </a>
        <a href="SEU-LINK-SHEIN" target="_blank">
          <img src="logomarca-shein.png" alt="SHEIN">
        </a>
      </div>

    </div>

  </div>
</div>

<script>
function fitScene() {
  const scene = document.getElementById("scene");

  const baseW = 1160;
  const baseH = 720;

  const scale = Math.min(
    window.innerWidth / baseW,
    window.innerHeight / baseH
  );

  scene.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", fitScene);
window.addEventListener("load", fitScene);
</script>

</body>
</html>
