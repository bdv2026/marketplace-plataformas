<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>

/* 🔒 DESKTOP INTACTO */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050608;
  position: relative;
  overflow: hidden;
}

/* METAL */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 50% 45%, rgba(255,255,255,0.95), transparent 25%),
    linear-gradient(90deg,#020203,#ffffff,#020203);
  mix-blend-mode: screen;
  z-index: -2;
}

/* FACHADA */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  z-index: -1;
}

.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
}

/* LATERAIS DESKTOP */
.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 220px;
  height: 100%;
  background: url('tijolo-fundo.png') no-repeat center;
  background-size: cover;
  padding: 20px;
}

.logos a { text-align: center; }

/* TAMANHO ORIGINAL */
.logos img { height: 90px; }
.logos img[alt="Mercado Livre"] { height: 160px; }
.logos img[alt="Jequiti"],
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { height: 110px; }

/* PRODUTOS DESKTOP */
.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 180px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  pointer-events: none;
}

.produtos-esquerda { left: calc(50% - 400px); }
.produtos-direita { right: calc(50% - 400px); }

.produtos-esquerda img,
.produtos-direita img {
  max-height: 120px;
}

/* ========================= */
/* 🔥 MOBILE (AGORA CERTO) */
/* ========================= */
@media (max-width: 768px) {

  html, body {
    overflow: hidden;
    height: 100%;
  }

  /* 🧱 TIJOLO = LARGURA DO LOGO JEQUITI */
  .logos {
    width: 100px;
    min-width: 100px;
    max-width: 100px;

    padding: 10px 5px;

    background: url('tijolo-fundo.png') repeat-y;
    background-size: contain;
  }

  /* 📌 POSICIONAMENTO CORRETO */
  .logos:first-child { margin-left: 0; }
  .logos:last-child { margin-right: 0; }

  /* 🏷️ TODOS IGUAIS (BASE SHOPEE) */
  .logos img {
    height: 60px;
  }

  /* 🖼️ PRODUTOS GRANDES (BASE JEQUITI) */
  .produtos-esquerda,
  .produtos-direita {
    width: 100px;
  }

  .produtos-esquerda { left: calc(50% - 200px); }
  .produtos-direita { right: calc(50% - 200px); }

  .produtos-esquerda img,
  .produtos-direita img {
    max-height: 60px;
  }

}

</style>
</head>

<body>

<div class="produtos-esquerda">
  <img src="decora.webp">
  <img src="eletrodomestico.jpg">
  <img src="eletroeletronico.jpg">
  <img src="jardinagem.jpg">
</div>

<div class="produtos-direita">
  <img src="ferramentas.webp">
  <img src="suplemento.jpg">
  <img src="roupa-acessorio.jpg">
</div>

<div class="container">

  <div class="logos">
    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png">
    </a>
    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png">
    </a>
    <a href="#"><img src="logomarca-amazon.jpg"></a>
  </div>

  <div class="logos">
    <a href="#"><img src="logomarca-jequiti.png"></a>
    <a href="#"><img src="logomarca-Shopee.jpg"></a>
    <a href="#"><img src="logomarca-shein.png"></a>
  </div>

</div>

</body>
</html>
