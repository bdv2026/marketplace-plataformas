<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050608;
  overflow: hidden;
}

/* 🔥 FUNDO (INALTERADO) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  pointer-events: none;
  z-index: -1;
}

/* 🔥 CÂMERA FIXA (CORREÇÃO REAL) */
#viewport {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* 🔥 SUA CENA ORIGINAL */
#scene {
  width: 1160px;
  height: 100vh;
  position: relative;
  transform-origin: top center;
}

/* CONTAINER ORIGINAL */
.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  padding: 0;
}

.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 0 0 220px;
  height: 100%;
  background: url('tijolo-fundo.png') no-repeat center;
  background-size: cover;
  margin: 0;
  padding: 20px;
  z-index: 2;
}

.logos a {
  display: block;
  text-align: center;
}

.logos img {
  height: 90px;
  transition: 0.2s;
}

.logos img[alt="Mercado Livre"] {
  height: 160px;
}

.logos img[alt="Jequiti"],
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] {
  height: 110px;
}

.logos a:hover img {
  transform: scale(1.05);
}

/* PRODUTOS (INALTERADO) */
.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 180px;
  z-index: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  pointer-events: none;
}

.produtos-esquerda {
  left: calc(50% - 400px);
}

.produtos-direita {
  right: calc(50% - 400px);
}

.produtos-esquerda img,
.produtos-direita img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
  opacity: 0.95;
}

/* 🔥 MOBILE ORIGINAL MANTIDO (NÃO MEXIDO) */
@media (max-width: 768px) {

  body {
    overflow: hidden;
  }

  .produtos-esquerda,
  .produtos-direita {
    display: none;
  }

  .container {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .logos {
    flex-direction: row;
    justify-content: space-around;
    width: 100%;
    height: auto;
    padding: 10px;
  }

  .logos img {
    height: 60px;
  }

  body::before {
    background-size: cover;
    background-position: center;
  }
}

</style>
</head>

<body>

<!-- 🔥 CAMERA WRAPPER -->
<div id="viewport">
  <div id="scene">

    <!-- PRODUTOS ESQUERDA -->
    <div class="produtos-esquerda">
      <img src="decora.webp">
      <img src="eletrodomestico.jpg">
      <img src="eletroeletronico.jpg">
      <img src="jardinagem.jpg">
    </div>

    <!-- PRODUTOS DIREITA -->
    <div class="produtos-direita">
      <img src="ferramentas.webp">
      <img src="suplemento.jpg">
      <img src="roupa-acessorio.jpg">
    </div>

    <div class="container">

      <div class="logos">
        <a href="https://meli.la/2qu3xa4" target="_blank">
          <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
        </a>

        <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
          <img src="logomarca-magalu.png" alt="Magalu">
        </a>

        <a href="SEU-LINK-AMAZON" target="_blank">
          <img src="logomarca-amazon.jpg" alt="Amazon">
        </a>
      </div>

      <div class="logos">
        <a href="SEU-LINK-JEQUITI" target="_blank">
          <img src="logomarca-jequiti.png" alt="Jequiti">
        </a>

        <a href="SEU-LINK-SHOPEE" target="_blank">
          <img src="logomarca-Shopee.jpg" alt="Shopee">
        </a>

        <a href="SEU-LINK-SHEIN" target="_blank">
          <img src="logomarca-shein.png" alt="SHEIN">
        </a>
      </div>

    </div>

  </div>
</div>

<script>
function fitScene() {
  const scene = document.getElementById("scene");

  const scale = Math.min(
    window.innerWidth / 1160,
    window.innerHeight / 720
  );

  scene.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", fitScene);
window.addEventListener("load", fitScene);
</script>

</body>
</html>
