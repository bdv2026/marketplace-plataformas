<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>

/* 🔥 TELA FIXA (MANTIDO) */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #050608;
}

/* 🔥 FACHADA (CORRIGIDA PARA VOLTAR) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  z-index: 0; /* 🔥 corrigido */
}

/* CONTAINER */
.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
  z-index: 2;
}

/* 🔥 LATERAIS */
.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;

  width: 110px;
  height: 100%;

  background: url('tijolo-fundo.png') repeat-y center;
  background-size: contain;

  padding: 10px 5px;
  box-sizing: border-box;
}

/* LINKS */
.logos a {
  display: block;
  text-align: center;
}

/* 🔥 LOGOS PADRONIZADOS */
.logos img {
  height: 60px;
}

/* 🔥 AJUSTE DO MERCADO LIVRE (ENCOSTADO À ESQUERDA) */
.logos:first-child a:first-child img {
  margin-left: -5px;
}

/* 🔥 PRODUTOS (VOLTARAM) */
.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 110px;

  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;

  pointer-events: none;
  z-index: 1;
}

.produtos-esquerda {
  left: calc(50% - 260px);
}

.produtos-direita {
  right: calc(50% - 260px);
}

/* 🔥 TAMANHO DOS PRODUTOS */
.produtos-esquerda img,
.produtos-direita img {
  max-height: 60px;
  object-fit: contain;
}

</style>
</head>

<body>

<!-- PRODUTOS -->
<div class="produtos-esquerda">
  <img src="decora.webp">
  <img src="eletrodomestico.jpg">
  <img src="eletroeletronico.jpg">
  <img src="jardinagem.jpg">
</div>

<div class="produtos-direita">
  <img src="ferramentas.webp">
  <img src="suplemento.jpg">
  <img src="roupa-acessorio.jpg">
</div>

<div class="container">

  <!-- ESQUERDA -->
  <div class="logos">
    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>
  </div>

  <!-- DIREITA -->
  <div class="logos">
    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>
  </div>

</div>

</body>
</html>
