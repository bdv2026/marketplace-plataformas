<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.D.V. Shopping Virtual</title>

  <style>
    body {
      margin: 0;
      background: #050608;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 MUNDO COMPLETO (TUDO DENTRO AQUI) */
    .world {
      width: 1160px;
      height: 100vh;
      position: relative;
      transform-origin: top center;
    }

    /* FUNDO DA FACHADA (AGORA DENTRO DO MUNDO) */
    .bg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
    }

    /* LOGOS LATERAIS */
    .logos {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 220px;
      height: 100%;
      background: url('tijolo-fundo.png') no-repeat center;
      background-size: cover;
      padding: 20px;
      z-index: 2;
    }

    .logos a {
      display: block;
      text-align: center;
    }

    .logos img {
      height: 90px;
      transition: 0.2s;
    }

    .logos img[alt="Mercado Livre"] {
      height: 160px;
    }

    .logos img[alt="Jequiti"],
    .logos img[alt="Shopee"],
    .logos img[alt="SHEIN"] {
      height: 110px;
    }

    .logos a:hover img {
      transform: scale(1.05);
    }

    /* PRODUTOS LATERAIS (AGORA DENTRO DO MUNDO, NÃO FIXO MAIS) */
    .produtos-esquerda,
    .produtos-direita {
      position: absolute;
      top: 0;
      height: 100%;
      width: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      pointer-events: none;
    }

    .produtos-esquerda {
      left: calc(50% - 580px);
    }

    .produtos-direita {
      right: calc(50% - 580px);
    }

    .produtos-esquerda img,
    .produtos-direita img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      opacity: 0.95;
    }

  </style>
</head>

<body>

<div class="world" id="world">

  <!-- FUNDO -->
  <img class="bg" src="fachada.png">

  <!-- PRODUTOS ESQUERDA -->
  <div class="produtos-esquerda">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
  </div>

  <!-- PRODUTOS DIREITA -->
  <div class="produtos-direita">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

  <div class="container">

    <div class="logos">
      <a href="https://meli.la/2qu3xa4" target="_blank">
        <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      </a>

      <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
        <img src="logomarca-magalu.png" alt="Magalu">
      </a>

      <a href="SEU-LINK-AMAZON" target="_blank">
        <img src="logomarca-amazon.jpg" alt="Amazon">
      </a>
    </div>

    <div class="logos">
      <a href="SEU-LINK-JEQUITI" target="_blank">
        <img src="logomarca-jequiti.png" alt="Jequiti">
      </a>

      <a href="SEU-LINK-SHOPEE" target="_blank">
        <img src="logomarca-Shopee.jpg" alt="Shopee">
      </a>

      <a href="SEU-LINK-SHEIN" target="_blank">
        <img src="logomarca-shein.png" alt="SHEIN">
      </a>
    </div>

  </div>

</div>

<script>
  function scaleWorld() {
    const world = document.getElementById("world");

    const baseWidth = 1160;
    const scale = window.innerWidth / baseWidth;

    world.style.transform = `scale(${scale})`;
  }

  window.addEventListener("resize", scaleWorld);
  window.addEventListener("load", scaleWorld);
</script>

</body>
</html>
