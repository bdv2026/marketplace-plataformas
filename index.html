<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* 🔥 tela fixa REAL */
  font-family: Arial, sans-serif;
  background: #050608;
}

/* FACHADA */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  z-index: -1;
}

/* CONTAINER */
.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
}

/* DESKTOP (INALTERADO) */
.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 220px;
  height: 100%;
  background: url('tijolo-fundo.png') no-repeat center;
  background-size: cover;
  padding: 20px;
}

/* LINKS */
.logos a {
  text-align: center;
}

/* TAMANHOS DESKTOP */
.logos img {
  height: 90px;
}

.logos img[alt="Mercado Livre"] {
  height: 160px;
}

.logos img[alt="Jequiti"],
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] {
  height: 110px;
}

/* PRODUTOS */
.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 180px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  pointer-events: none;
}

.produtos-esquerda {
  left: calc(50% - 400px);
}

.produtos-direita {
  right: calc(50% - 400px);
}

/* 🔥 MOBILE CORRETO */
@media (max-width: 768px) {

  /* 🔥 FUNDO DE TIJOLO CORRETO */
  .logos {
    position: fixed;
    top: 0;
    height: 100%;

    width: 110px; /* 🔥 igual ao tamanho da Jequiti */
    padding: 10px 5px;

    background: url('tijolo-fundo.png') repeat-y center;
    background-size: contain;
  }

  /* ESQUERDA */
  .logos:first-child {
    left: 0;
  }

  /* DIREITA */
  .logos:last-child {
    right: 0;
  }

  /* 🔥 LOGOS TODOS IGUAIS (tamanho da Shopee) */
  .logos img {
    height: 60px;
  }

  /* 🔥 PRODUTOS MESMO TAMANHO DA JEQUITI */
  .produtos-esquerda,
  .produtos-direita {
    width: 110px;
  }

  .produtos-esquerda {
    left: calc(50% - 220px);
  }

  .produtos-direita {
    right: calc(50% - 220px);
  }

  .produtos-esquerda img,
  .produtos-direita img {
    max-height: 60px;
  }

}

</style>
</head>

<body>

<!-- PRODUTOS -->
<div class="produtos-esquerda">
  <img src="decora.webp">
  <img src="eletrodomestico.jpg">
  <img src="eletroeletronico.jpg">
  <img src="jardinagem.jpg">
</div>

<div class="produtos-direita">
  <img src="ferramentas.webp">
  <img src="suplemento.jpg">
  <img src="roupa-acessorio.jpg">
</div>

<div class="container">

  <!-- ESQUERDA -->
  <div class="logos">
    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>
  </div>

  <!-- DIREITA -->
  <div class="logos">
    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>
  </div>

</div>

</body>
</html>
