<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.D.V. Shopping Virtual</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background: #050608;

      position: relative;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.95), transparent 25%),
        radial-gradient(circle at 30% 70%, rgba(220,230,255,0.35), transparent 50%),
        radial-gradient(circle at 75% 30%, rgba(200,210,230,0.3), transparent 50%),
        linear-gradient(
          90deg,
          #020203 0%,
          #0f1116 15%,
          #3a404c 30%,
          #dfe6ef 45%,
          #ffffff 50%,
          #dfe6ef 55%,
          #3a404c 70%,
          #0f1116 85%,
          #020203 100%
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.02) 3px
        );

      mix-blend-mode: screen;
      opacity: 0.95;

      pointer-events: none;
      z-index: -2;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;

      background: url('fachada.png') no-repeat center top;
      background-size: contain;

      pointer-events: none;
      z-index: -1;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      padding: 0;
    }

    .logos {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 220px;
      height: 100%;
      background: url('tijolo-fundo.png') no-repeat center;
      background-size: cover;
      margin: 0;
      padding: 20px;
    }

    .logos img {
      height: 90px;
    }

    /* AUMENTO APENAS DO MERCADO LIVRE */
    .logos img[alt="Mercado Livre"] {
      height: 120px;
    }

    .logos img[alt="Jequiti"],
    .logos img[alt="Shopee"],
    .logos img[alt="SHEIN"] {
      height: 110px;
    }

    .buttons {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: space-between;
      width: 60%;
      height: 100%;
    }

    .col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 220px;
      padding: 20px 0;
    }

    .buttons a {
      padding: 12px 16px;
      font-weight: bold;
      font-size: 1.1em;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      text-align: center;
    }

    .mercado-livre { background-color: #ffcc00; color: #000; }
    .magalu { background-color: #007bff; }
    .amazon { background-color: #000; }
    .jequiti { background-color: #e91e63; }
    .shopee { background-color: #ff5722; }
    .shein { background-color: #111; }

    .buttons a:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logos">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      <img src="logomarca-magalu.png" alt="Magalu">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </div>

    <div class="logos">
      <img src="logomarca-jequiti.png" alt="Jequiti">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
      <img src="logomarca-shein.png" alt="SHEIN">
    </div>

    <div class="buttons">
      <div class="col">
        <a class="mercado-livre" href="https://meli.la/1qinjc3" target="_blank">Clique Aqui</a>
        <a class="magalu" href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">Clique Aqui</a>
        <a class="amazon" href="SEU-LINK-AMAZON" target="_blank">Clique Aqui</a>
      </div>
      <div class="col">
        <a class="jequiti" href="SEU-LINK-JEQUITI" target="_blank">Clique Aqui</a>
        <a class="shopee" href="SEU-LINK-SHOPEE" target="_blank">Clique Aqui</a>
        <a class="shein" href="SEU-LINK-SHEIN" target="_blank">Clique Aqui</a>
      </div>
    </div>

  </div>
</body>
</html>
