<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>

/* =========================
   DESKTOP (INALTERADO)
========================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050608;
  position: relative;
  overflow: hidden;
}

/* FACHADA */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: url('fachada.png') no-repeat center top;
  background-size: contain;
  pointer-events: none;
  z-index: -1;
}

.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
}

.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 0 0 220px;
  height: 100%;
  background: url('tijolo-fundo.png') no-repeat center;
  background-size: cover;
  padding: 20px;
  z-index: 2;
}

.logos a {
  display: block;
  text-align: center;
}

.logos img {
  height: 90px;
}

.logos img[alt="Mercado Livre"] {
  height: 160px;
}

.logos img[alt="Jequiti"],
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] {
  height: 110px;
}

/* PRODUTOS DESKTOP */
.produtos-esquerda,
.produtos-direita {
  position: fixed;
  top: 0;
  height: 100%;
  width: 180px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  pointer-events: none;
}

.produtos-esquerda {
  left: calc(50% - 400px);
}

.produtos-direita {
  right: calc(50% - 400px);
}

.produtos-esquerda img,
.produtos-direita img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}

/* =========================
   📱 MOBILE (AJUSTE REAL)
========================= */

@media (max-width: 768px) {

  /* 🔒 TELA FIXA */
  html, body {
    height: 100%;
    overflow: hidden;
  }

  /* 🧱 FUNDO DE TIJOLO PADRÃO (IGUAL NOS DOIS LADOS) */
  .logos {
    flex: 0 0 110px;
    width: 110px;
    min-width: 110px;
    max-width: 110px;

    padding: 10px 5px;

    background-size: contain;
  }

  /* 🏷️ LOGOS PADRONIZADOS (BASE SHOPEE MANTIDA) */
  .logos img {
    height: 65px;
  }

  /* 🖼️ PRODUTOS = TAMANHO JEQUITI (MAIOR VISUALMENTE) */
  .produtos-esquerda img,
  .produtos-direita img {
    max-height: 75px;
    width: auto;
  }

  /* 🔧 CENTRALIZAÇÃO SEM QUEBRAR A FACHADA */
  .container {
    align-items: center;
  }

  body::before {
    background-size: cover;
    background-position: center;
  }

}
</style>
</head>

<body>

<!-- PRODUTOS -->
<div class="produtos-esquerda">
  <img src="decora.webp">
  <img src="eletrodomestico.jpg">
  <img src="eletroeletronico.jpg">
  <img src="jardinagem.jpg">
</div>

<div class="produtos-direita">
  <img src="ferramentas.webp">
  <img src="suplemento.jpg">
  <img src="roupa-acessorio.jpg">
</div>

<div class="container">

  <div class="logos">
    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>
  </div>

  <div class="logos">
    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>
  </div>

</div>

</body>
</html>
