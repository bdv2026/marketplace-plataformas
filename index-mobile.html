<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;
  background: #050608;
}

/* 🔝 TOPO FIXO (FACHADA) */
.topo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: url("fachada.png") no-repeat center top;
  background-size: cover;
  background-color: #050608;
}

/* 🔻 BASE FIXA */
.base {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
  background: url("tijolo-fundo.png") no-repeat center;
  background-size: cover;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* LOGOS */
.logos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 95%;
}

.logos a {
  display: flex;
  justify-content: center;
  align-items: center;
}

.logos img {
  height: 60px;
  width: auto;
  display: block;
  object-fit: contain;
}

/* ajustes individuais */
.logos img[alt="Mercado Livre"] { max-height: 80px; }
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { max-height: 70px; }

/* PRODUTOS LATERAIS */
.produtos {
  position: absolute;
  top: 45%;
  width: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  pointer-events: none;
  opacity: 0.5;
  filter: grayscale(100%);
}

.produtos.esquerda { left: 0; }
.produtos.direita { right: 0; }

.produtos img {
  width: 100%;
  object-fit: contain;
}
</style>
