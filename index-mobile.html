<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #050608;
  overflow: hidden;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* 🔥 FUNDO (FACHADA GLOBAL AJUSTADA PARA MOBILE) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("fachada.png") no-repeat center top;
  background-size: cover;
  z-index: -2;
  pointer-events: none;
}

/* 🔥 CAMADA PRINCIPAL */
.mobile-container {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  box-sizing: border-box;
}

/* 🔥 LOGOS (CLICÁVEIS PRESERVADOS) */
.logos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  background: url("tijolo-fundo.png") no-repeat center;
  background-size: cover;
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
  z-index: 2;
}

.logos a {
  display: inline-block;
}

.logos img {
  height: 55px;
  object-fit: contain;
}

/* ajustes leves de hierarquia visual */
.logos img[alt="Mercado Livre"] { height: 90px; }
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { height: 70px; }

/* 🔥 PRODUTOS (ORGANIZADOS PARA TELA VERTICAL) */
.produtos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  width: 100%;
  padding: 10px;
  box-sizing: border-box;
  z-index: 1;
}

.produtos img {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 4px;
}

/* 🔥 GARANTE CAMADAS CORRETAS */
.mobile-container {
  z-index: 1;
}
</style>
</head>

<body>

<div class="mobile-container">

  <!-- LOGOS -->
  <div class="logos">

    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>

    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>

  </div>

  <!-- PRODUTOS -->
  <div class="produtos">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

</div>

</body>
</html>
