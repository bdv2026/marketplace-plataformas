<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* 🔥 FUNDO DA FACHADA (CORRIGIDO E GARANTIDO) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-image: url("fachada.png");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  z-index: -1;
  pointer-events: none;
}

/* CONTAINER PRINCIPAL */
.mobile-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 10px;
}

/* LOGOS */
.logos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  background: url("tijolo-fundo.png") center/cover;
  padding: 10px;
  width: 100%;
  box-sizing: border-box;
}

.logos img {
  height: 60px;
  object-fit: contain;
}

/* PRODUTOS */
.produtos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
  padding: 10px;
  box-sizing: border-box;
}

.produtos img {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* GARANTE QUE CONTEÚDO FIQUE ACIMA DO FUNDO */
.mobile-container {
  position: relative;
  z-index: 1;
}

</style>
</head>

<body>

<div class="mobile-container">

  <div class="logos">
    <img src="logomarca-mercadolivre.png">
    <img src="logomarca-magalu.png">
    <img src="logomarca-amazon.jpg">
    <img src="logomarca-jequiti.png">
    <img src="logomarca-Shopee.jpg">
    <img src="logomarca-shein.png">
  </div>

  <div class="produtos">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

</div>

</body>
</html>
