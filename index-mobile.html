<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* 🔥 FUNDO: FACHADA APENAS */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("fachada.png") no-repeat center top;
  background-size: cover;
  z-index: -1;
}

/* 🔥 CONTAINER DOS BOTÕES (SEM ALTERAR LÓGICA) */
.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: space-between;
}

/* 🔥 LOGOS MANTIDOS COMO ESTÃO */
.logos {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 0 0 140px;
  padding: 20px;
}

.logos a {
  display: block;
  text-align: center;
}

.logos img {
  height: 60px;
  object-fit: contain;
  transition: 0.2s;
}

/* mantém diferenciação original */
.logos img[alt="Mercado Livre"] { height: 100px; }
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { height: 75px; }

.logos a:hover img {
  transform: scale(1.05);
}

</style>
</head>

<body>

<div class="container">

  <div class="logos">

    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>

    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>

  </div>

  <div style="flex:0 0 140px;"></div>

</div>

</body>
</html>
