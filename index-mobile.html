<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;
  background: #050608;
}

/* 🔝/* 🔝 TOPO FIXO (FACHADA) */
.topo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: url("fachada.png") no-repeat center top;
  background-size: contain;
  background-color: #050608;
}

/* 🔻 BASE FIXA (TIJOLO + LOGOS) */
.base {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
  background: url("tijolo-fundo.png") no-repeat center;
  background-size: cover;
  padding-top: 10px;

  display: flex;
  align-items: center;
  justify-content: center;
}
}

/* LOGOS */
.logos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
  margin-bottom: 20px;
}

.logos a {
  display: flex;
  justify-content: center;
  align-items: center;
}

.logos img {
  width: 140%;
  max-height: 60px;
  object-fit: contain;
}

.logos img[alt="Mercado Livre"] { max-height: 80px; }
.logos img[alt="Shopee"],
.logos img[alt="SHEIN"] { max-height: 70px; }

/* 🧱 PRODUTOS LATERAIS NO TOPO */
.produtos {
  position: absolute;
  top: 45%;
  height: 100%;
  width: 120px;
  display: flex;
  flex-direction: column;
  justify-content:  flex-start;
  align-items: center;
  gap: 20px;
  pointer-events: none;
   opacity: 0.5;
  filter: grayscale(100%);
}

.produtos.esquerda {
  left: 0;
}

.produtos.direita {
  right: 0;
}

.produtos img {
  width: 100%;
  max-height: 700px;
  object-fit: contain;
  opacity: 0.9;
}

</style>
</head>

<body>

<div class="topo">

  <!-- PRODUTOS ESQUERDA -->
  <div class="produtos esquerda">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
  </div>

  <!-- PRODUTOS DIREITA -->
  <div class="produtos direita">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

</div>

<div class="base">
  <div class="logos">

    <a href="https://meli.la/2qu3xa4" target="_blank">
      <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
    </a>

    <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
      <img src="logomarca-magalu.png" alt="Magalu">
    </a>

    <a href="SEU-LINK-AMAZON" target="_blank">
      <img src="logomarca-amazon.jpg" alt="Amazon">
    </a>

    <a href="SEU-LINK-JEQUITI" target="_blank">
      <img src="logomarca-jequiti.png" alt="Jequiti">
    </a>

    <a href="SEU-LINK-SHOPEE" target="_blank">
      <img src="logomarca-Shopee.jpg" alt="Shopee">
    </a>

    <a href="SEU-LINK-SHEIN" target="_blank">
      <img src="logomarca-shein.png" alt="SHEIN">
    </a>

  </div>
</div>

</body>
</html>
