<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #050608;
}

/* 🔥 CONTAINER GERAL FIXO */
.mobile-wrapper {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 🔥 PARTE SUPERIOR (FACHADA) */
.top-area {
  position: relative;
  height: 50vh;
  width: 100%;
  background: url("fachada.png") no-repeat center top;
  background-size: cover;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  box-sizing: border-box;
}

/* PRODUTOS NAS LATERAIS DA FACHADA */
.side-products {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  height: 100%;
  width: 90px;
}

.side-products img {
  width: 100%;
  max-height: 70px;
  object-fit: contain;
}

/* 🔥 PARTE INFERIOR (TIJOLO) */
.bottom-area {
  height: 50vh;
  width: 100%;
  background: url("tijolo-fundo.png") no-repeat center;
  background-size: cover;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  padding: 10px;
  box-sizing: border-box;
}

/* LOGOS CLICÁVEIS */
.logos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.logos a img {
  height: 50px;
  object-fit: contain;
}

/* ajustes visuais leves */
.logos a img[alt="Mercado Livre"] { height: 80px; }
.logos a img[alt="Shopee"],
.logos a img[alt="SHEIN"] { height: 65px; }

</style>
</head>

<body>

<div class="mobile-wrapper">

  <!-- 🔥 TOPO: FACHADA + PRODUTOS LATERAIS -->
  <div class="top-area">

    <div class="side-products">
      <img src="decora.webp">
      <img src="eletrodomestico.jpg">
      <img src="eletroeletronico.jpg">
      <img src="jardinagem.jpg">
    </div>

    <div class="side-products">
      <img src="ferramentas.webp">
      <img src="suplemento.jpg">
      <img src="roupa-acessorio.jpg">
    </div>

  </div>

  <!-- 🔥 BASE: TIJOLO + LOGOS -->
  <div class="bottom-area">

    <div class="logos">

      <a href="https://meli.la/2qu3xa4" target="_blank">
        <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      </a>

      <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
        <img src="logomarca-magalu.png" alt="Magalu">
      </a>

      <a href="SEU-LINK-AMAZON" target="_blank">
        <img src="logomarca-amazon.jpg" alt="Amazon">
      </a>

      <a href="SEU-LINK-JEQUITI" target="_blank">
        <img src="logomarca-jequiti.png" alt="Jequiti">
      </a>

      <a href="SEU-LINK-SHOPEE" target="_blank">
        <img src="logomarca-Shopee.jpg" alt="Shopee">
      </a>

      <a href="SEU-LINK-SHEIN" target="_blank">
        <img src="logomarca-shein.png" alt="SHEIN">
      </a>

    </div>

  </div>

</div>

</body>
</html>
