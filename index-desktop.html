<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.D.V. Shopping Virtual</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050608;
    overflow: hidden;
    height: 100%;
  }

  /* 🔥 CENA BASE FIXA (REFERÊNCIA PC) */
  #scene {
    width: 1160px;
    height: 720px;
    position: absolute;
    top: 0;
    left: 50%;
    transform-origin: top center;
  }

  /* FUNDO FACHADA */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    background: url('fachada.png') no-repeat center top;
    background-size: contain;
    pointer-events: none;
    z-index: -1;
  }

  .container {
    position: relative;
    height: 100%;
    display: flex;
    justify-content: space-between;
  }

  .logos {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 0 0 220px;
    background: url('tijolo-fundo.png') no-repeat center;
    background-size: cover;
    padding: 20px;
  }

  .logos a {
    text-align: center;
  }

  .logos img {
    height: 90px;
  }

  .logos img[alt="Mercado Livre"] { height: 160px; }
  .logos img[alt="Jequiti"],
  .logos img[alt="Shopee"],
  .logos img[alt="SHEIN"] { height: 110px; }

  .produtos-esquerda,
  .produtos-direita {
    position: fixed;
    top: 0;
    height: 100%;
    width: 180px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    pointer-events: none;
  }

  .produtos-esquerda { left: calc(50% - 400px); }
  .produtos-direita { right: calc(50% - 400px); }

  .produtos-esquerda img,
  .produtos-direita img {
    width: 100%;
    max-height: 120px;
    object-fit: contain;
  }

</style>
</head>

<body>

<div id="scene">

  <div class="produtos-esquerda">
    <img src="decora.webp">
    <img src="eletrodomestico.jpg">
    <img src="eletroeletronico.jpg">
    <img src="jardinagem.jpg">
  </div>

  <div class="produtos-direita">
    <img src="ferramentas.webp">
    <img src="suplemento.jpg">
    <img src="roupa-acessorio.jpg">
  </div>

  <div class="container">

    <div class="logos">
      <a href="https://meli.la/2qu3xa4" target="_blank">
        <img src="logomarca-mercadolivre.png" alt="Mercado Livre">
      </a>
      <a href="https://www.magazinevoce.com.br/magazinein_1479585/" target="_blank">
        <img src="logomarca-magalu.png" alt="Magalu">
      </a>
      <a href="SEU-LINK-AMAZON" target="_blank">
        <img src="logomarca-amazon.jpg" alt="Amazon">
      </a>
    </div>

    <div class="logos">
      <a href="SEU-LINK-JEQUITI" target="_blank">
        <img src="logomarca-jequiti.png" alt="Jequiti">
      </a>
      <a href="SEU-LINK-SHOPEE" target="_blank">
        <img src="logomarca-Shopee.jpg" alt="Shopee">
      </a>
      <a href="SEU-LINK-SHEIN" target="_blank">
        <img src="logomarca-shein.png" alt="SHEIN">
      </a>
    </div>

  </div>

</div>

<script>
function scaleScene() {
  const scene = document.getElementById("scene");

  const baseW = 1160;
  const baseH = 720;

  const scale = Math.min(
    window.innerWidth / baseW,
    window.innerHeight / baseH
  );

  scene.style.transform = `translateX(-50%) scale(${scale})`;
}

window.addEventListener("resize", scaleScene);
window.addEventListener("load", scaleScene);
</script>

</body>
</html>
